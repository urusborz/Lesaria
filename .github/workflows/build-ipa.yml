name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Xcode auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verfügbare Schemes anzeigen
        run: xcodebuild -list || true

      - name: App bauen (ohne Signierung)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme "Meine App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: .ipa verpacken
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          echo "Gefundene App: $APP"
          if [ -z "$APP" ]; then echo "Keine .app gefunden"; exit 1; fi
          mkdir -p Payload
          cp -R "$APP" "Payload/"
          zip -r -y "MeineApp.ipa" Payload
          ls -la

      - name: .ipa hochladen (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MeineApp-ipa
          path: MeineApp.ipa
