name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available schemes
        run: xcodebuild -list || true

      - name: Build app binary without signing
        run: |
          set -o pipefail
          xcodebuild \
            -scheme "Meine App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA for Sideloadly
        run: |
          set -euo pipefail

          PRODUCT_DIR="build/Build/Products/Release-iphoneos"
          EXECUTABLE_SRC="$PRODUCT_DIR/Meine App"
          APP_DIR="Payload/HomeUI.app"

          echo "Product directory contents:"
          find "$PRODUCT_DIR" -maxdepth 2 -print

          if [ ! -f "$EXECUTABLE_SRC" ]; then
            echo "Expected executable not found: $EXECUTABLE_SRC"
            exit 1
          fi

          rm -rf Payload HomeUI.ipa
          mkdir -p "$APP_DIR"
          cp "$EXECUTABLE_SRC" "$APP_DIR/HomeUI"
          chmod +x "$APP_DIR/HomeUI"
          printf 'APPL????' > "$APP_DIR/PkgInfo"

          cat > "$APP_DIR/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Home UI</string>
              <key>CFBundleExecutable</key>
              <string>HomeUI</string>
              <key>CFBundleIdentifier</key>
              <string>com.urusborz.homeui</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>HomeUI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>18.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          PLIST

          plutil -lint "$APP_DIR/Info.plist"
          /usr/bin/zip -r -y HomeUI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeUI-unsigned-ipa
          path: HomeUI.ipa
