name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available schemes
        run: xcodebuild -list || true

      - name: Build app binary without signing
        run: |
          set -o pipefail
          xcodebuild \
            -scheme "Meine App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA for Sideloadly
        run: |
          set -euo pipefail

          PRODUCT_DIR="build/Build/Products/Release-iphoneos"
          EXECUTABLE_SRC="$PRODUCT_DIR/Meine App"
          APP_DIR="Payload/HomeUI.app"

          echo "Product directory contents:"
          find "$PRODUCT_DIR" -maxdepth 2 -print

          if [ ! -f "$EXECUTABLE_SRC" ]; then
            echo "Expected executable not found: $EXECUTABLE_SRC"
            exit 1
          fi

          rm -rf Payload HomeUI.ipa
          mkdir -p "$APP_DIR"
          cp "$EXECUTABLE_SRC" "$APP_DIR/HomeUI"
          chmod +x "$APP_DIR/HomeUI"
          printf 'APPL????' > "$APP_DIR/PkgInfo"

          ICON_SOURCE=".github/assets/AppIconSource.jpg"
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "Expected icon source not found: $ICON_SOURCE"
            exit 1
          fi

          generate_icon() {
            local name="$1"
            local size="$2"
            local tmp="$RUNNER_TEMP/${name%.png}.png"
            sips -s format png "$ICON_SOURCE" --out "$tmp" >/dev/null
            sips -z "$size" "$size" "$tmp" --out "$APP_DIR/$name" >/dev/null
          }

          generate_icon "AppIcon60x60@2x.png" 120
          generate_icon "AppIcon60x60@3x.png" 180
          generate_icon "AppIcon76x76@2x.png" 152
          generate_icon "AppIcon83.5x83.5@2x.png" 167
          generate_icon "AppIcon1024.png" 1024

          cat > "$APP_DIR/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Home UI</string>
              <key>CFBundleExecutable</key>
              <string>HomeUI</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>CFBundleIcons~ipad</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon76x76</string>
                          <string>AppIcon83.5x83.5</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>CFBundleIdentifier</key>
              <string>com.urusborz.homeui</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>HomeUI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>18.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          PLIST

          plutil -lint "$APP_DIR/Info.plist"
          /usr/bin/zip -r -y HomeUI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeUI-unsigned-ipa
          path: HomeUI.ipa

      - name: Create GitHub Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "HomeUI Build #${{ github.run_number }}"
          body: |
            Automatischer Build vom ${{ github.sha }}

            **Zum Installieren:** IPA herunterladen → Sideloadly → aufs iPhone spielen.
          files: HomeUI.ipa
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
