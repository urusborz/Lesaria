name: Upload to TestFlight

on:
  workflow_dispatch:

jobs:
  upload-testflight:
    runs-on: macos-15
    permissions:
      contents: read

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "$APPLE_TEAM_ID"
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"
          test -n "$BUILD_CERTIFICATE_BASE64"
          test -n "$BUILD_PROVISION_PROFILE_BASE64"
          test -n "$P12_PASSWORD"

      - name: Prepare App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys" private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          cp "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Update build number
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
          CI_PRIMARY_REPOSITORY_PATH: ${{ github.workspace }}
        run: ./ci_scripts/ci_pre_xcodebuild.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install signing certificate and profile
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          PROFILE_PLIST="$RUNNER_TEMP/build_profile.plist"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")

          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Profile application identifier: $PROFILE_APP_ID"

      - name: Prepare CI app source
        run: |
          set -euo pipefail
          rm -rf build/ci_source
          mkdir -p build/ci_source
          find Lesaria.swiftpm -maxdepth 1 -name '*.swift' ! -name 'Package.swift' -exec cp {} build/ci_source/ \;
          cp Lesaria.swiftpm/Info.plist build/ci_source/Info.plist
          cp Lesaria.swiftpm/LaunchScreen.storyboard build/ci_source/LaunchScreen.storyboard
          cp Lesaria.swiftpm/Lesaria.entitlements build/ci_source/Lesaria.entitlements
          cp Lesaria.swiftpm/PrivacyInfo.xcprivacy build/ci_source/PrivacyInfo.xcprivacy
          cp -R Lesaria.swiftpm/Assets.xcassets build/ci_source/Assets.xcassets

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.urusborz.lesaria</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -project "Lesaria.xcodeproj" \
            -scheme "Lesaria" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Lesaria.xcarchive \
            -derivedDataPath build/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/Lesaria.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Verify exported bundle metadata
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi

          INSPECT_DIR="$RUNNER_TEMP/lesaria-ipa-inspect"
          rm -rf "$INSPECT_DIR"
          mkdir -p "$INSPECT_DIR"
          unzip -q "$IPA_PATH" -d "$INSPECT_DIR"

          APP_DIR="$INSPECT_DIR/Payload/Lesaria.app"
          INFO_PLIST="$APP_DIR/Info.plist"
          test -f "$INFO_PLIST"
          test -f "$APP_DIR/Assets.car"
          test -d "$APP_DIR/LaunchScreen.storyboardc"

          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$INFO_PLIST" | grep -qx "AppIcon"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName" "$INFO_PLIST" | grep -qx "AppIcon"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconName" "$INFO_PLIST" | grep -qx "AppIcon"
          /usr/libexec/PlistBuddy -c "Print :UILaunchStoryboardName" "$INFO_PLIST" | grep -qx "LaunchScreen"
          /usr/libexec/PlistBuddy -c "Print :UISupportedInterfaceOrientations" "$INFO_PLIST" | grep -q "UIInterfaceOrientationPortraitUpsideDown"
          /usr/libexec/PlistBuddy -c "Print :UISupportedInterfaceOrientations" "$INFO_PLIST" | grep -q "UIInterfaceOrientationLandscapeLeft"
          /usr/libexec/PlistBuddy -c "Print :UISupportedInterfaceOrientations" "$INFO_PLIST" | grep -q "UIInterfaceOrientationLandscapeRight"
          echo "Exported IPA metadata is ready for App Store validation."

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lesaria-TestFlight-IPA
          path: build/export/*.ipa

      - name: Validate IPA with App Store Connect
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          set +e
          OUTPUT="$(xcrun altool \
            --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ] || echo "$OUTPUT" | grep -Eqi "Validation failed|ERROR:"; then
            exit 1
          fi

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          set +e
          OUTPUT="$(xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ] || echo "$OUTPUT" | grep -Eqi "Validation failed|ERROR:"; then
            exit 1
          fi
