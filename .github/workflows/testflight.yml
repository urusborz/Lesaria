name: Upload to TestFlight

on:
  workflow_dispatch:

jobs:
  upload-testflight:
    runs-on: macos-15
    permissions:
      contents: read

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "$APPLE_TEAM_ID"
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"

      - name: Prepare App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys" private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          cp "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Update build number
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
          CI_PRIMARY_REPOSITORY_PATH: ${{ github.workspace }}
        run: ./ci_scripts/ci_pre_xcodebuild.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare CI app source
        run: |
          set -euo pipefail
          rm -rf build/ci_source
          mkdir -p build/ci_source
          cp Lesaria.swiftpm/*.swift build/ci_source/
          cp Lesaria.swiftpm/Info.plist build/ci_source/Info.plist
          cp Lesaria.swiftpm/Lesaria.entitlements build/ci_source/Lesaria.entitlements
          cp Lesaria.swiftpm/PrivacyInfo.xcprivacy build/ci_source/PrivacyInfo.xcprivacy
          cp -R Lesaria.swiftpm/Assets.xcassets build/ci_source/Assets.xcassets

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -project "Lesaria.xcodeproj" \
            -scheme "Lesaria" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Lesaria.xcarchive \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$GITHUB_WORKSPACE/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/Lesaria.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$GITHUB_WORKSPACE/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lesaria-TestFlight-IPA
          path: build/export/*.ipa

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
